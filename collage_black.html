<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    /* 1. КРИТИЧЕСКИ ВАЖНО: Убираем отступы и запрещаем скролл самого документа */
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* Это убирает ползунок */
        height: 100%;
        width: 100%;
        background-color: #000;
    }

    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');

    .collage-container {
        display: grid;
        width: 100%;
        height: 100vh; /* Используем всю высоту окна */
        grid-template-columns: 1.2fr 1fr;
        grid-template-rows: auto 1fr 1fr auto;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box; /* Чтобы padding не увеличивал размер блока */
        background-color: #000;
    }

    /* Стили объектов (без изменений) */
    .obj-1 { grid-column: 1 / -1; grid-row: 1; min-height: 150px; }
    .obj-2 { grid-column: 1; grid-row: 2 / 4; }
    .obj-3 { grid-column: 2; grid-row: 2; }
    .obj-4 { grid-column: 2; grid-row: 3; }
    .obj-5 { grid-column: 1 / -1; grid-row: 4; min-height: 150px; }

    /* Базовый стиль кнопки */
    .city-button {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        font-family: 'Playfair Display', serif;
    }

    .city-button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .dark-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        opacity: 0.3;
        transition: opacity 0.3s ease;
        z-index: 1;
    }

    .btn-text {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 24px;
        font-weight: 600;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        z-index: 2;
        text-align: center;
    }

    /* 2. ИСПРАВЛЕННЫЙ MEDIA-БЛОК */
    @media (max-width: 768px) {
        .collage-container {
            /* Оставляем сетку, но делаем её более компактной */
            grid-template-columns: 1fr 1fr;
            /* Используем minmax, чтобы избежать наслоения как на фото */
            grid-template-rows: minmax(100px, auto) minmax(140px, 1fr) minmax(140px, 1fr) minmax(100px, auto);
            gap: 8px;
            padding: 8px;
            height: 100%; /* Гарантируем, что сетка не вылезает за пределы */
        }

        .btn-text {
            font-size: 16px; /* Уменьшаем текст, чтобы не распирал блоки */
            padding: 5px;
        }

        /* Уточняем позиции для мобильных, чтобы не было нахлеста */
        .obj-1 { grid-row: 1; min-height: 100px; }
        .obj-2 { grid-row: 2 / 4; }
        .obj-3 { grid-row: 2; }
        .obj-4 { grid-row: 3; }
        .obj-5 { grid-row: 4; min-height: 100px; }
    }
</style>
    <title>Black Collage</title>
</head>
<body>

<div class="collage-container">

    <div class="city-button obj-1">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 1"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Верхний блок</div> 
    </div>

    <div class="city-button obj-2">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 2"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Левый высокий</div> 
    </div>

    <div class="city-button obj-3">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 3"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Правый верх</div> 
    </div>

    <div class="city-button obj-4">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 4"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Правый низ</div> 
    </div>

    <div class="city-button obj-5">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 5"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Показать другие города</div> 
    </div>

</div>

</body>
</html>
