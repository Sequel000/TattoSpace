<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Подключаем шрифт Playfair Display */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');

        /* Обнуляем отступы страницы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Сделали общий фон страницы черным */
            background-color: #000; 
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР КОЛЛАЖА */
        .collage-container {
            display: grid;
            width: 100%;
            min-height: 100vh;
            
            /* Настройка колонок */
            grid-template-columns: 1.2fr 1fr;
            
            /* Настройка рядов */
            grid-template-rows: auto 1fr 1fr auto;
            
            /* ГЛАВНОЕ ИЗМЕНЕНИЕ: Черный фон и зазоры */
            gap: 12px; /* Ширина черных полос */
            padding: 12px; /* Отступ от краев экрана */
            box-sizing: border-box;
            background-color: #000; /* Цвет пространства между картинками */
        }

        /* ОПРЕДЕЛЕНИЕ ПОЗИЦИЙ ДЛЯ КАЖДОГО ОБЪЕКТА */
        .obj-1 { grid-column: 1 / -1; grid-row: 1; min-height: 180px; }
        .obj-2 { grid-column: 1; grid-row: 2 / 4; }
        .obj-3 { grid-column: 2; grid-row: 2; }
        .obj-4 { grid-column: 2; grid-row: 3; }
        .obj-5 { grid-column: 1 / -1; grid-row: 4; min-height: 180px; }

        /* СТИЛЬ КНОПКИ-КАРТОЧКИ */
        .city-button {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 8px; /* Немного уменьшил радиус для строгости на черном фоне */
            overflow: hidden;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
            background: #111; /* Темный фон-заглушка пока грузится фото */
        }

        .city-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ТЕМНЫЙ СЛОЙ (ЗАТЕМНЕНИЕ) */
        .dark-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            opacity: 0.3;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        /* ТЕКСТ НА ФОТО */
        .btn-text {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
            z-index: 2;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* ЭФФЕКТЫ ПРИ НАВЕДЕНИИ */
        .city-button:hover .dark-layer {
            opacity: 0.6;
        }
        .city-button:hover .btn-text {
            transform: scale(1.05);
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .collage-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                gap: 10px;
            }
            .obj-1, .obj-2, .obj-3, .obj-4, .obj-5 {
                grid-column: 1;
                grid-row: auto;
                min-height: 250px;
            }
        }
    </style>
    <title>Black Collage</title>
</head>
<body>

<div class="collage-container">

    <div class="city-button obj-1">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 1"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Верхний блок</div> 
    </div>

    <div class="city-button obj-2">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 2"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Левый высокий</div> 
    </div>

    <div class="city-button obj-3">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 3"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Правый верх</div> 
    </div>

    <div class="city-button obj-4">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 4"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Правый низ</div> 
    </div>

    <div class="city-button obj-5">
        <img src="https://cdn.jsdelivr.net/gh/Sequel000/TattoSpace@main/Tatto%20Space%20IMG/image/City/Kagul.jpeg" alt="Img 5"> 
        <div class="dark-layer"></div>
        <div class="btn-text">Показать другие города</div> 
    </div>

</div>

</body>
</html>
